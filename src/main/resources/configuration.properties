# Database Configuration
# SECURITY WARNING: Never commit real credentials. Use environment variables in production.
database.mysql.dbtype=mysql
database.mysql.class=com.mysql.cj.jdbc.Driver
database.mysql.url=jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/
database.mysql.username=${DB_USERNAME:root}
database.mysql.password=${DB_PASSWORD:changeme}

database=derby
database.derby.dbtype=derby
database.derby.class=org.apache.derby.jdbc.EmbeddedDriver
database.derby.url=jdbc:derby:
database.derby.username=root
database.derby.password=changeme

# Encryption Key - MUST be set via environment variable in production
encryptionkey=${ENCRYPTION_KEY:changeme}

# Logging Configuration
logger.filename=logfile.txt
logger.enabled=true
logger.debug=${DEBUG_MODE:false}